name: Update component tree

on:
  push:
    branches: [main]
    paths:
      - 'src/components/**'

jobs:
  update-tree:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install tree
        run: sudo apt-get install -y tree

      - name: Update MODULES.md and index.html
        run: |
          python3 - <<'PYEOF'
          import subprocess, re
          from datetime import datetime, timezone

          # Generar árbol
          result = subprocess.run(
              ["tree", "src/components", "--noreport", "-F"],
              capture_output=True, text=True
          )
          tree = result.stdout.strip() if result.returncode == 0 else "(sin archivos aun)"
          date = datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M UTC")

          # --- Actualizar MODULES.md ---
          new_md = f"<!-- TREE:START -->\n_Actualizado: {date}_\n\n```\n{tree}\n```\n<!-- TREE:END -->"

          with open("MODULES.md", "r") as f:
              content = f.read()

          updated = re.sub(
              r"<!-- TREE:START -->.*?<!-- TREE:END -->",
              new_md,
              content,
              flags=re.DOTALL
          )

          with open("MODULES.md", "w") as f:
              f.write(updated)

          print("MODULES.md actualizado")

          # --- Actualizar index.html ---
          tree_html = tree.replace("&", "&amp;").replace("<", "&lt;").replace(">", "&gt;")
          new_html = f'<!-- TREE:START -->\n<p class="tree-date">Actualizado: {date}</p>\n<pre class="tree-output">{tree_html}</pre>\n<!-- TREE:END -->'

          with open("index.html", "r") as f:
              content = f.read()

          updated = re.sub(
              r"<!-- TREE:START -->.*?<!-- TREE:END -->",
              new_html,
              content,
              flags=re.DOTALL
          )

          with open("index.html", "w") as f:
              f.write(updated)

          print("index.html actualizado")
          PYEOF

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add MODULES.md index.html
          git diff --cached --quiet || git commit -m "chore: auto-update component tree [skip ci]"
          git push